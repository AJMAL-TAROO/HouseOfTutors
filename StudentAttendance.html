<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO Meta Tags -->
    <title>Student Attendance - House of Tutors | Track Attendance</title>
    <meta name="description" content="Track and manage student attendance at House of Tutors.">
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://www.housesoftutors.com/StudentAttendance.html">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>

<body class="bg-gray-100">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <button class="btn btn-dark" onclick="window.location.href='DashboardAdmin.html'">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <a class="navbar-brand mx-auto" href="#">House Of Tutors</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="text-3xl font-bold">Student Attendance</h1>
            <button id="downloadExcelBtn" class="btn btn-success">
                <i class="fa-solid fa-file-excel"></i> Download Excel
            </button>
        </div>
        <div id="calendar" class="bg-white shadow-lg rounded-lg p-4"></div>
    </div>

    <!-- Attendance Popup Modal -->
    <div id="attendanceModal" class="modal fade" tabindex="-1" role="dialog">
        <div class="modal-dialog modal-lg" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Mark Attendance</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <form id="attendanceForm">
                        <div class="mb-3">
                            <label for="classroomSelect" class="font-weight-bold">Select Classroom</label>
                            <select id="classroomSelect" class="form-control mt-1">
                                <option value="">-- Select a classroom --</option>
                            </select>
                        </div>
                        <div id="attendanceTableWrapper" style="display:none;">
                            <table class="table table-bordered">
                                <thead>
                                    <tr>
                                        <th>Student Name</th>
                                        <th>Present</th>
                                        <th>Absent</th>
                                    </tr>
                                </thead>
                                <tbody id="attendanceTableBody">
                                    <!-- Rows will be populated dynamically -->
                                </tbody>
                            </table>
                            <button type="submit" class="btn btn-primary mt-3">Submit</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Export to Excel Modal -->
    <div id="exportModal" class="modal fade" tabindex="-1" role="dialog">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Export Attendance to Excel</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="exportClassroomSelect" class="font-weight-bold">Select Classroom</label>
                        <select id="exportClassroomSelect" class="form-control mt-1">
                            <option value="">-- Select a classroom --</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="exportMonthSelect" class="font-weight-bold">Select Month</label>
                        <select id="exportMonthSelect" class="form-control mt-1">
                            <option value="01">January</option>
                            <option value="02">February</option>
                            <option value="03">March</option>
                            <option value="04">April</option>
                            <option value="05">May</option>
                            <option value="06">June</option>
                            <option value="07">July</option>
                            <option value="08">August</option>
                            <option value="09">September</option>
                            <option value="10">October</option>
                            <option value="11">November</option>
                            <option value="12">December</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="exportYearSelect" class="font-weight-bold">Select Year</label>
                        <select id="exportYearSelect" class="form-control mt-1">
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="exportBtn" class="btn btn-success">
                        <i class="fa-solid fa-download"></i> Download
                    </button>
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCwol-nlbl1YFv67pJg2XOo9U",
            authDomain: "houseoftutors-f398e.firebaseapp.com",
            databaseURL: "https://houseoftutors-f398e-default-rtdb.firebaseio.com/",
            projectId: "houseoftutors-f398e",
            storageBucket: "houseoftutors-f398e.appspot.com",
            messagingSenderId: "1006665226128",
            appId: "1:1006665226128:web:bcf481758d361da3ef8515",
            measurementId: "G-PEM636J9ZD"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // Get admin email from localStorage
        const adminEmail = localStorage.getItem('userEmail');

        // Initialize FullCalendar
        const calendarEl = document.getElementById('calendar');
        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            dateClick: function(info) {
                openAttendanceModal(info.dateStr);
            }
        });
        calendar.render();

        const attendanceTableBody = document.getElementById('attendanceTableBody');
        const attendanceTableWrapper = document.getElementById('attendanceTableWrapper');
        const classroomSelect = document.getElementById('classroomSelect');
        let students = {};
        let cachedAdminKey = null;

        // Parse a comma-separated ID string into a trimmed, non-empty array
        function parseIds(str) {
            return str ? str.split(',').map(s => s.trim()).filter(s => s) : [];
        }

        // Build a display label for a classroom option
        function classroomLabel(classroom, roomId) {
            return (classroom && classroom.TITLE) ? `${classroom.TITLE} (${roomId})` : `Classroom ${roomId}`;
        }

        async function getAdminKey() {
            if (cachedAdminKey) return cachedAdminKey;
            const adminRef = ref(database, "ADMIN");
            const adminSnapshot = await get(adminRef);
            if (adminSnapshot.exists()) {
                const admins = adminSnapshot.val();
                for (const key in admins) {
                    if (admins[key].EMAIL === adminEmail) {
                        cachedAdminKey = key;
                        return key;
                    }
                }
            }
            return null;
        }

        // Populate classroom dropdown from admin's VIRTUAL_ROOMS
        async function populateClassroomDropdown() {
            classroomSelect.innerHTML = '<option value="">-- Select a classroom --</option>';
            if (!adminEmail) return;

            const adminKey = await getAdminKey();
            if (!adminKey) return;

            const adminRef = ref(database, `ADMIN/${adminKey}`);
            const adminSnapshot = await get(adminRef);
            if (!adminSnapshot.exists()) return;

            const adminData = adminSnapshot.val();
            const virtualRooms = parseIds(adminData.VIRTUAL_ROOMS);

            for (const roomId of virtualRooms) {
                const classroomRef = ref(database, `CLASSROOMS/CLASSROOM_${roomId}`);
                const classroomSnapshot = await get(classroomRef);
                const option = document.createElement('option');
                option.value = roomId;
                option.text = classroomLabel(classroomSnapshot.exists() ? classroomSnapshot.val() : null, roomId);
                classroomSelect.appendChild(option);
            }
        }

        // Load students enrolled in the selected classroom
        async function loadStudentsForClassroom(classroomId) {
            attendanceTableBody.innerHTML = '';
            students = {};

            if (!classroomId) {
                attendanceTableWrapper.style.display = 'none';
                return;
            }

            const studentsRef = ref(database, 'STUDENTS');
            const studentsSnapshot = await get(studentsRef);
            if (!studentsSnapshot.exists()) {
                attendanceTableWrapper.style.display = 'none';
                return;
            }

            const allStudents = studentsSnapshot.val();
            for (const studentId in allStudents) {
                const student = allStudents[studentId];
                const rooms = parseIds(student.VIRTUAL_ROOMS);
                if (rooms.includes(classroomId)) {
                    students[studentId] = student;
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${student.FULL_NAME}</td>
                        <td>
                            <input type="radio" name="attendance_${studentId}" value="present" />
                        </td>
                        <td>
                            <input type="radio" name="attendance_${studentId}" value="absent" />
                        </td>
                    `;
                    row.setAttribute('data-student-id', studentId);
                    attendanceTableBody.appendChild(row);
                }
            }

            attendanceTableWrapper.style.display = 'block';
        }

        // Pre-fill attendance from Firebase for the selected date and classroom
        async function loadAttendanceForDate(date, classroomId) {
            if (!date || !classroomId) return;
            const [year, month, day] = date.split('-');
            const adminKey = await getAdminKey();
            if (!adminKey) return;

            const attendanceRef = ref(database, `ATTENDANCE/${year}/${month}/${day}/${adminKey}/CLASSROOM_${classroomId}`);
            const snapshot = await get(attendanceRef);
            const attendanceData = snapshot.val();

            Array.from(attendanceTableBody.children).forEach((row) => {
                const studentId = row.getAttribute('data-student-id');
                const presentRadio = row.querySelector(`input[name="attendance_${studentId}"][value="present"]`);
                const absentRadio = row.querySelector(`input[name="attendance_${studentId}"][value="absent"]`);

                if (attendanceData && attendanceData[studentId]) {
                    const status = attendanceData[studentId].attendance;
                    presentRadio.checked = status === 'present';
                    absentRadio.checked = status === 'absent';
                } else {
                    presentRadio.checked = false;
                    absentRadio.checked = false;
                }
            });
        }

        // Open attendance modal for a given date
        function openAttendanceModal(date) {
            const modal = document.getElementById('attendanceModal');
            modal.setAttribute('data-date', date);

            // Reset classroom selection and hide table
            classroomSelect.value = '';
            attendanceTableBody.innerHTML = '';
            attendanceTableWrapper.style.display = 'none';

            $(modal).modal('show');
        }

        // When classroom is changed inside the modal, reload students and attendance
        classroomSelect.addEventListener('change', async function() {
            const classroomId = this.value;
            await loadStudentsForClassroom(classroomId);
            if (classroomId) {
                const date = document.getElementById('attendanceModal').getAttribute('data-date');
                await loadAttendanceForDate(date, classroomId);
            }
        });

        // Handle attendance form submission
        document.getElementById('attendanceForm').addEventListener('submit', async(event) => {
            event.preventDefault();

            const classroomId = classroomSelect.value;
            if (!classroomId) {
                alert('Please select a classroom first.');
                return;
            }

            const date = document.getElementById('attendanceModal').getAttribute('data-date');
            const [year, month, day] = date.split('-');
            const adminKey = await getAdminKey();

            // Prepare attendance data
            const attendanceData = {};
            Array.from(attendanceTableBody.children).forEach((row) => {
                const studentId = row.getAttribute('data-student-id');
                const presentRadio = row.querySelector(`input[name="attendance_${studentId}"][value="present"]`);
                const absentRadio = row.querySelector(`input[name="attendance_${studentId}"][value="absent"]`);

                if (presentRadio.checked) {
                    attendanceData[studentId] = {
                        full_name: students[studentId].FULL_NAME,
                        attendance: 'present'
                    };
                } else if (absentRadio.checked) {
                    attendanceData[studentId] = {
                        full_name: students[studentId].FULL_NAME,
                        attendance: 'absent'
                    };
                }
            });

            // Save attendance under adminKey/CLASSROOM_<classroomId>
            const attendanceRef = ref(database, `ATTENDANCE/${year}/${month}/${day}/${adminKey}/CLASSROOM_${classroomId}`);
            await set(attendanceRef, attendanceData)
                .then(() => {
                    alert('Attendance recorded successfully!');
                    $('#attendanceModal').modal('hide');
                })
                .catch((error) => {
                    console.error('Error recording attendance:', error);
                    alert('Failed to record attendance.');
                });
        });

        // Load classroom dropdown on page load
        window.onload = function() {
            populateClassroomDropdown();

            // Populate year dropdown for export (5 past years + current + 1 future)
            const now = new Date();
            const currentYear = now.getFullYear();
            const exportYearSelect = document.getElementById('exportYearSelect');
            for (let y = currentYear - 4; y <= currentYear + 1; y++) {
                const opt = document.createElement('option');
                opt.value = String(y);
                opt.text = String(y);
                if (y === currentYear) opt.selected = true;
                exportYearSelect.appendChild(opt);
            }
        };

        // Populate export classroom dropdown (same rooms as the existing one)
        async function populateExportClassroomDropdown() {
            const exportClassroomSelect = document.getElementById('exportClassroomSelect');
            exportClassroomSelect.innerHTML = '<option value="">-- Select a classroom --</option>';
            if (!adminEmail) return;

            const adminKey = await getAdminKey();
            if (!adminKey) return;

            const adminRef = ref(database, `ADMIN/${adminKey}`);
            const adminSnapshot = await get(adminRef);
            if (!adminSnapshot.exists()) return;

            const adminData = adminSnapshot.val();
            const virtualRooms = parseIds(adminData.VIRTUAL_ROOMS);

            for (const roomId of virtualRooms) {
                const classroomRef = ref(database, `CLASSROOMS/CLASSROOM_${roomId}`);
                const classroomSnapshot = await get(classroomRef);
                const option = document.createElement('option');
                option.value = roomId;
                option.text = classroomLabel(classroomSnapshot.exists() ? classroomSnapshot.val() : null, roomId);
                exportClassroomSelect.appendChild(option);
            }
        }

        // Open export modal when Download Excel button is clicked
        document.getElementById('downloadExcelBtn').addEventListener('click', async function() {
            await populateExportClassroomDropdown();
            // Default month to current month
            const now = new Date();
            document.getElementById('exportMonthSelect').value = String(now.getMonth() + 1).padStart(2, '0');
            document.getElementById('exportYearSelect').value = String(now.getFullYear());
            $('#exportModal').modal('show');
        });

        // Handle Excel export when Download button is clicked inside the export modal
        document.getElementById('exportBtn').addEventListener('click', async function() {
            const classroomId = document.getElementById('exportClassroomSelect').value;
            const month = document.getElementById('exportMonthSelect').value;
            const year = document.getElementById('exportYearSelect').value;

            if (!classroomId) {
                alert('Please select a classroom.');
                return;
            }

            const adminKey = await getAdminKey();
            if (!adminKey) {
                alert('Admin not found. Please log in again.');
                return;
            }

            // Resolve classroom display name for the filename and spreadsheet
            const classroomRef = ref(database, `CLASSROOMS/CLASSROOM_${classroomId}`);
            const classroomSnapshot = await get(classroomRef);
            const classroomName = classroomSnapshot.exists() && classroomSnapshot.val().TITLE
                ? classroomSnapshot.val().TITLE
                : `Classroom_${classroomId}`;

            // Fetch the entire month's attendance in a single query, then filter
            const monthRef = ref(database, `ATTENDANCE/${year}/${month}`);
            const monthSnapshot = await get(monthRef);
            const rows = [];

            if (monthSnapshot.exists()) {
                const monthData = monthSnapshot.val();
                for (const dd of Object.keys(monthData).sort()) {
                    const dayData = monthData[dd];
                    if (dayData[adminKey] && dayData[adminKey][`CLASSROOM_${classroomId}`]) {
                        const dateStr = `${year}-${month}-${dd}`;
                        const attendanceData = dayData[adminKey][`CLASSROOM_${classroomId}`];
                        for (const studentId in attendanceData) {
                            const record = attendanceData[studentId];
                            rows.push({
                                'Student ID': studentId,
                                'Student Name': record.full_name,
                                'Date': dateStr,
                                'Status': record.attendance,
                                'Classroom': classroomName
                            });
                        }
                    }
                }
            }

            if (rows.length === 0) {
                alert('No attendance records found for the selected classroom and month.');
                return;
            }

            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.json_to_sheet(rows, {
                header: ['Student ID', 'Student Name', 'Date', 'Status', 'Classroom']
            });
            XLSX.utils.book_append_sheet(wb, ws, 'Attendance');

            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
                'July', 'August', 'September', 'October', 'November', 'December'];
            const monthName = monthNames[parseInt(month) - 1];
            const filename = `Attendance_${classroomName}_${monthName}_${year}.xlsx`;

            XLSX.writeFile(wb, filename);
            $('#exportModal').modal('hide');
        });
    </script>
</body>
</html>
